services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hackathon
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./services/api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: ./services/api/.env.local
    depends_on:
      - postgres
      - redis
    volumes:
      - ./services/api:/app

  celery-worker:
    build: ./services/api
    command: uv run celery -A app.workers.celery_app worker --loglevel=info
    env_file: ./services/api/.env.local
    depends_on:
      - postgres
      - redis
    volumes:
      - ./services/api:/app

volumes:
  pgdata:
