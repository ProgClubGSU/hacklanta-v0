name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen --all-extras
      - run: uv run ruff check app/
      - run: uv run pytest -q

  pre-deploy-backup:
    name: Pre-Deploy Database Backup
    needs: lint-and-test
    runs-on: ubuntu-latest
    outputs:
      snapshot_id: ${{ steps.rds-snapshot.outputs.snapshot_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Create RDS snapshot
        id: rds-snapshot
        run: |
          SNAPSHOT_ID="pre-deploy-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::8}"
          echo "snapshot_id=${SNAPSHOT_ID}" >> "$GITHUB_OUTPUT"
          echo "==> Creating RDS snapshot: ${SNAPSHOT_ID}"
          aws rds create-db-snapshot \
            --db-instance-identifier hacklanta-db \
            --db-snapshot-identifier "$SNAPSHOT_ID"
          echo "==> Waiting for snapshot to complete..."
          aws rds wait db-snapshot-available \
            --db-snapshot-identifier "$SNAPSHOT_ID"
          echo "==> Snapshot ready: ${SNAPSHOT_ID}"

      - name: Dump database to S3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          chmod +x scripts/backup-db.sh
          ./scripts/backup-db.sh

  deploy-api:
    name: Build & Deploy API
    needs: pre-deploy-backup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ secrets.ECR_REPO }}:latest \
            -t ${{ secrets.ECR_REPO }}:${{ github.sha }} \
            ./services/api
          docker push ${{ secrets.ECR_REPO }}:latest
          docker push ${{ secrets.ECR_REPO }}:${{ github.sha }}

      - name: Run Alembic migrations
        uses: astral-sh/setup-uv@v4
      - run: |
          cd services/api
          uv sync --frozen --all-extras
          uv run alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster hacklanta \
            --service hacklanta-api \
            --force-new-deployment \
            --region us-east-2

      - name: Wait for deployment stability
        run: |
          echo "==> Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster hacklanta \
            --services hacklanta-api \
            --region us-east-2
          echo "==> Deployment stable."

      - name: Print rollback info on failure
        if: failure()
        run: |
          SNAPSHOT_ID="${{ needs.pre-deploy-backup.outputs.snapshot_id }}"
          echo "::error::Deployment failed! Pre-deploy snapshot available for rollback."
          echo ""
          echo "  Snapshot ID: ${SNAPSHOT_ID}"
          echo ""
          echo "  To restore from snapshot:"
          echo "    aws rds restore-db-instance-from-db-snapshot \\"
          echo "      --db-instance-identifier hacklanta-db-restored \\"
          echo "      --db-snapshot-identifier ${SNAPSHOT_ID} \\"
          echo "      --region us-east-2"
